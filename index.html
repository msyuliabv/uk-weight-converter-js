<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UK Weight Converter</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f6f8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.1);
      width: 350px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 24px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 16px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 16px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: black;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    .result {
      margin-top: 20px;
      font-size: 18px;
      text-align: center;
    }

    .error {
      margin-top: 12px;
      color: #b00020;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>UK Weight Converter</h1>

    <label for="kgInput">Enter weight in kilograms</label>
    <input type="number" id="kgInput" placeholder="e.g. 70" step="0.1" />

    <button onclick="convertWeight()">Convert</button>

    <div class="error" id="errorMessage"></div>
    <div class="result" id="result"></div>
  </div>

  <script src="app.js"></script>

</body>
</html>
